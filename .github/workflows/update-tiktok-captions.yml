name: Update TikTok captions

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-captions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Refresh captions from TikTok oEmbed
        run: node scripts/update-tiktok-captions.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No caption changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: refresh TikTok video captions"
          git push
